<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodDash - Register</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><i class="fas fa-utensils"></i> FoodDash</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="restaurants.html">Restaurants</a>
            <a href="menu.html">Menu</a>
        </div>
        <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    </nav>

    <section class="auth-section">
        <div class="auth-card glass">
            <div class="auth-header">
                <i class="fas fa-user-plus"></i>
                <h2 id="registerTitle">Customer Registration</h2>
                <p>Join FoodDash today! Create a free account.</p>
            </div>
            
            <div class="role-selector">
                <button type="button" class="role-tab active" onclick="switchRegisterRole('customer')">
                    <i class="fas fa-user"></i> Customer
                </button>
                <button type="button" class="role-tab" onclick="switchRegisterRole('owner')">
                    <i class="fas fa-store"></i> Restaurant Owner
                </button>
                <button type="button" class="role-tab" onclick="switchRegisterRole('admin')">
                    <i class="fas fa-user-shield"></i> Admin
                </button>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <input type="hidden" id="registerRole" value="customer">
                
                <div class="form-group">
                    <label id="nameLabel"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="regName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="regEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone</label>
                    <input type="tel" id="regPhone" placeholder="Enter your phone number" required>
                </div>

                <!-- Customer Specific Fields -->
                <div id="customerFields">
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> Address</label>
                        <input type="text" id="regAddress" placeholder="Enter your address">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-city"></i> City</label>
                        <input type="text" id="regCity" placeholder="Enter your city">
                    </div>
                </div>

                <!-- Restaurant Owner Specific Fields -->
                <div id="ownerFields" style="display:none;">
                    <div class="form-group">
                        <label><i class="fas fa-utensils"></i> Restaurant Name</label>
                        <input type="text" id="regRestaurantName" placeholder="Enter restaurant name">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-map-pin"></i> Restaurant Location</label>
                        <input type="text" id="regRestaurantLocation" placeholder="Enter restaurant location">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-hamburger"></i> Cuisine Type</label>
                        <input type="text" id="regRestaurantCuisine" placeholder="e.g. Italian, Fast Food, Desserts">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" id="loginLink">Login here</a></p>
            </div>
            <div id="registerMessage"></div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
